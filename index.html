
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link rel="icon" type="image/jpg" href="logo2.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0c0c0c;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── HIGHSCORE BOX top-right ── */
  .hs-box {
    position: fixed;
    top: 1.6rem;
    right: 1.8rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 10px 18px;
    border-radius: 2px;
    background: #0e0e0e;
    box-shadow: 0 0 0 1px #f0f0f0, 0 4px 0 0 #a0a0a0, 0 5px 14px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: box-shadow 0.4s ease;
    min-width: 116px;
    z-index: 10;
  }

  .hs-box.new {
    animation: hsFlash 0.5s ease;
  }

  @keyframes hsFlash {
    0%   { box-shadow: 0 0 0 1px #fff, 0 4px 0 0 #ccc, 0 0 40px rgba(255,255,255,0.25); }
    100% { box-shadow: 0 0 0 1px #f0f0f0, 0 4px 0 0 #a0a0a0, 0 5px 14px rgba(255,255,255,0.04); }
  }

  .hs-label {
    font-size: 8px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: #444;
    font-weight: 400;
  }

  .hs-time {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.03em;
    font-variant-numeric: tabular-nums;
    color: #eee;
  }

  .hs-time.empty { color: #2a2a2a; }

  /* ── MAIN TIMER ── */
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3.5rem;
  }

  #display {
    font-size: clamp(72px, 15vw, 152px);
    font-weight: 500;
    letter-spacing: -0.02em;
    color: #f2f2f2;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    user-select: none;
    transition: color 0.35s ease;
  }

  #display.paused { color: #2e2e2e; }
  #display.running { color: #f2f2f2; }

  .controls {
    display: flex;
    align-items: center;
    gap: 1.2rem;
  }

  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    outline: none;
    padding: 10px 22px;
    border-radius: 2px;
    position: relative;
    transition: all 0.07s ease;
    -webkit-user-select: none;
    user-select: none;
  }

  .btn.reset {
    background: #0c0c0c;
    color: #444;
    box-shadow: 0 0 0 1px #2a2a2a, 0 4px 0 0 #1a1a1a, 0 5px 8px rgba(0,0,0,0.5);
  }
  .btn.reset:hover { color: #888; box-shadow: 0 0 0 1px #3a3a3a, 0 4px 0 0 #1a1a1a, 0 5px 8px rgba(0,0,0,0.5); }
  .btn.reset:active { transform: translateY(3px); box-shadow: 0 0 0 1px #2a2a2a, 0 1px 0 0 #1a1a1a, 0 2px 4px rgba(0,0,0,0.4); }

  .btn.primary {
    background: #161616;
    color: #d0d0d0;
    box-shadow: 0 0 0 1px #383838, 0 4px 0 0 #0a0a0a, 0 5px 12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  }
  .btn.primary:hover { color: #fff; background: #1c1c1c; box-shadow: 0 0 0 1px #484848, 0 4px 0 0 #0a0a0a, 0 6px 16px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06); }
  .btn.primary:active { transform: translateY(3px); background: #111; box-shadow: 0 0 0 1px #303030, 0 1px 0 0 #0a0a0a, 0 2px 6px rgba(0,0,0,0.5); }
  .btn:active::after { content: ''; position: absolute; inset: 0; border-radius: 2px; background: rgba(255,255,255,0.03); }

  .dot { width: 3px; height: 3px; border-radius: 50%; background: #222; }
</style>
</head>
<body>

<!-- Highscore top-right -->
<div class="hs-box" id="hsBox">
  <span class="hs-label">best</span>
  <span class="hs-time empty" id="hsTime">--:--:--</span>
</div>

<!-- Timer -->
<div class="wrap">
  <div id="display" class="paused">00:00:00</div>
  <div class="controls">
    <button class="btn reset" id="resetBtn">Reset</button>
    <div class="dot"></div>
    <button class="btn primary" id="pauseBtn">Start</button>
  </div>
</div>

<script>
  const display  = document.getElementById('display');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const hsBox    = document.getElementById('hsBox');
  const hsTime   = document.getElementById('hsTime');

  let startTime   = 0;   // absolute ms when timer last started
  let accumulated = 0;   // ms accumulated before last pause
  let running     = false;
  let rafId       = null;
  let worker      = null;
  let highscore   = parseInt(localStorage.getItem('timer_hs') || '0', 10);
  let brokeDuring = false;

  function pad(n) { return String(n).padStart(2, '0'); }
  function format(ms) {
    const s = Math.floor(ms / 1000);
    return pad(Math.floor(s / 3600)) + ':' + pad(Math.floor((s % 3600) / 60)) + ':' + pad(s % 60);
  }

  function elapsed() {
    return running ? accumulated + (performance.now() - startTime) : accumulated;
  }

  function renderHS() {
    if (highscore === 0) { hsTime.textContent = '--:--:--'; hsTime.className = 'hs-time empty'; return; }
    hsTime.textContent = format(highscore);
    hsTime.className = 'hs-time';
  }
  renderHS();

  function checkRecord(ms) {
    if (ms > highscore) {
      highscore = ms;
      localStorage.setItem('timer_hs', Math.floor(ms));
      hsTime.textContent = format(highscore);
      hsTime.className = 'hs-time';
      if (!brokeDuring) {
        brokeDuring = true;
        hsBox.classList.remove('new');
        void hsBox.offsetWidth; // reflow to retrigger animation
        hsBox.classList.add('new');
        setTimeout(() => hsBox.classList.remove('new'), 600);
      }
    }
  }

  // Web Worker — keeps ticking when tab is hidden
  const workerSrc = `
    let iv = null;
    self.onmessage = function(e) {
      if (e.data === 'start') { if (!iv) iv = setInterval(() => self.postMessage('tick'), 200); }
      else if (e.data === 'stop') { clearInterval(iv); iv = null; }
    };
  `;
  try {
    worker = new Worker(URL.createObjectURL(new Blob([workerSrc], { type: 'application/javascript' })));
    worker.onmessage = function() {
      if (!running) return;
      const ms = elapsed();
      display.textContent = format(ms);
      checkRecord(ms);
    };
  } catch(e) { worker = null; }

  // rAF for smooth updates when tab is visible
  function tick() {
    if (!running) return;
    const ms = elapsed();
    display.textContent = format(ms);
    checkRecord(ms);
    rafId = requestAnimationFrame(tick);
  }

  pauseBtn.addEventListener('click', () => {
    if (!running) {
      // START / RESUME
      running = true;
      startTime = performance.now();
      display.className = 'running';
      pauseBtn.textContent = 'Pause';
      if (worker) worker.postMessage('start');
      rafId = requestAnimationFrame(tick);
    } else {
      // PAUSE
      accumulated += performance.now() - startTime;
      running = false;
      cancelAnimationFrame(rafId);
      if (worker) worker.postMessage('stop');
      display.className = 'paused';
      pauseBtn.textContent = 'Resume';
    }
  });

  resetBtn.addEventListener('click', () => {
    running = false;
    accumulated = 0;
    startTime = 0;
    brokeDuring = false;
    cancelAnimationFrame(rafId);
    if (worker) worker.postMessage('stop');
    display.textContent = '00:00:00';
    display.className = 'paused';
    pauseBtn.textContent = 'Start';
  });
</script>
</body>
</html>
